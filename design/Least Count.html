  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r(--overlay);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:20;border-radius:var(--r-lg);animation:popIn .25s ease both\">\n            <div style=\"text-align:center;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--r-xl);padding:28px;box-shadow:var(--sh-xl);max-width:280px\">\n              <div style=\"width:56px;height:56px;border-radius:50%;background:color-mix(in oklch,var(--danger) 18%,var(--surface));color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px\">⚡<\u002Fdiv>\n              <div style=\"font-family:var(--font-display);font-size:23px\">Connection lost<\u002Fdiv>\n              <div style=\"color:var(--text-secondary);font-size:13px;margin:6px 0 18px\">We can't reach the room right now.<\u002Fdiv>\n              <button onclick=\"{{ onRetry }}\" style=\"height:46px;padding:0 28px;border-radius:var(--r-pill);background:var(--primary);color:var(--on-primary);font-weight:700;font-size:15px\">Reconnect<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ TABLE ============ -->\n      <sc-if value=\"{{ isTable }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"height:100%;display:flex;flex-direction:column;animation:floatUp .4s ease both\">\n        <!-- felt -->\n        <div style=\"position:relative;flex:1;min-height:0;border-radius:var(--r-xl);background:radial-gradient(ellipse at 50% 42%,var(--felt),var(--felt-2));border:1px solid color-mix(in oklch,var(--felt-2) 60%,black);box-shadow:var(--sh-lg),inset 0 2px 24px oklch(0 0 0 / .28);overflow:hidden\">\n          <!-- opponents -->\n          <sc-for list=\"{{ opponents }}\" as=\"op\" hint-placeholder-count=\"4\">\n            <div style=\"position:absolute;transform:translate(-50%,-50%);{{ op.pos }};display:flex;flex-direction:column;align-items:center;gap:4px;width:70px\">\n              <div style=\"position:relative;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;{{ op.face }}\">\n                {{ op.initials }}\n                <sc-if value=\"{{ op.disconnected }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;bottom:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--surface);border:2px solid var(--felt-2);color:var(--warn);font-size:9px;display:flex;align-items:center;justify-content:center\">⚠<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size:10.5px;font-weight:700;color:white;text-shadow:0 1px 3px oklch(0 0 0 / .5);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ op.name }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:4px;height:19px;padding:0 8px;border-radius:var(--r-pill);background:oklch(0 0 0 / .3);color:white;font-size:10.5px;font-weight:700\"><span style=\"opacity:.75\">🂠<\u002Fspan>{{ op.count }}<\u002Fdiv>\n              <sc-if value=\"{{ op.disconnected }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:9px;color:var(--warn);font-weight:700;letter-spacing:.3px\">reconnecting…<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <!-- center piles -->\n          <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;gap:18px;align-items:center\">\n            <!-- draw pile -->\n            <button onclick=\"{{ onOpenDraw }}\" style=\"position:relative;width:70px;height:98px;border:none;background:none\">\n              <div style=\"position:absolute;inset:0;transform:rotate(-5deg) translate(2px,2px);border-radius:var(--r-card);background:var(--card-back);box-shadow:var(--sh-card)\"><\u002Fdiv>\n              <div style=\"position:absolute;inset:0;transform:rotate(3deg);border-radius:var(--r-card);background:repeating-linear-gradient(45deg,var(--card-back),var(--card-back) 6px,var(--card-back-2) 6px,var(--card-back-2) 12px);border:2px solid color-mix(in oklch,white 30%,transparent);box-shadow:var(--sh-card);display:flex;align-items:center;justify-content:center\">\n                <div style=\"width:30px;height:30px;border-radius:50%;border:2px solid color-mix(in oklch,white 60%,transparent);display:flex;align-items:center;justify-content:center;color:white;font-family:var(--font-display);font-size:16px\">L<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;font-weight:700;color:white;background:oklch(0 0 0 / .35);padding:2px 8px;border-radius:var(--r-pill)\">Deck · {{ drawCount }}<\u002Fdiv>\n            <\u002Fbutton>\n            <!-- discard pile -->\n            <div style=\"position:relative;width:70px;height:98px\">\n              <div style=\"position:absolute;inset:0;transform:rotate(6deg);border-radius:var(--r-card);background:var(--card-face);opacity:.5;box-shadow:var(--sh-sm)\"><\u002Fdiv>\n              <div style=\"position:absolute;inset:0;border-radius:var(--r-card);background:var(--card-face);color:{{ discardColor }};box-shadow:var(--sh-card);border:1px solid var(--card-edge);animation:popIn .3s ease\">\n                <div style=\"position:absolute;top:6px;left:8px;text-align:center;line-height:.85;font-weight:800;font-size:15px\">{{ discardRank }}<div style=\"font-size:13px\">{{ discardSym }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center\"><span style=\"font-family:var(--font-display);font-size:34px;line-height:.9\">{{ discardRank }}<\u002Fspan><span style=\"font-size:19px;margin-top:-2px\">{{ discardSym }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;font-weight:700;color:white;background:oklch(0 0 0 / .35);padding:2px 8px;border-radius:var(--r-pill)\">Discard<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- reconnecting / error overlays -->\n          <sc-if value=\"{{ tRecon }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;inset:0;background:var(--overlay);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:15\">\n              <span style=\"width:34px;height:34px;border:3px solid color-mix(in oklch,white 30%,transparent);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite\"><\u002Fspan>\n              <div style=\"color:white;font-weight:700;font-size:15px\">Reconnecting to the table…<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ tError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;inset:0;background:var(--overlay);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:15\">\n              <div style=\"text-align:center;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--r-xl);padding:26px;box-shadow:var(--sh-xl)\">\n                <div style=\"width:52px;height:52px;border-radius:50%;background:color-mix(in oklch,var(--danger) 18%,var(--surface));color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px\">⚡<\u002Fdiv>\n                <div style=\"font-family:var(--font-display);font-size:22px\">Connection lost<\u002Fdiv>\n                <div style=\"color:var(--text-secondary);font-size:13px;margin:6px 0 16px\">You dropped out of the game.<\u002Fdiv>\n                <button onclick=\"{{ onReconnect }}\" style=\"height:44px;padding:0 26px;border-radius:var(--r-pill);background:var(--primary);color:var(--on-primary);font-weight:700\">Rejoin<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- turn + timer -->\n        <div style=\"flex:none;display:flex;align-items:center;gap:11px;margin:12px 2px 10px\">\n          <div style=\"position:relative;width:38px;height:38px;flex:none\">\n            <svg viewBox=\"0 0 38 38\" style=\"width:38px;height:38px;transform:rotate(-90deg)\"><circle cx=\"19\" cy=\"19\" r=\"16\" fill=\"none\" stroke=\"var(--border)\" strokewidth=\"4\"><\u002Fcircle><circle cx=\"19\" cy=\"19\" r=\"16\" fill=\"none\" stroke=\"{{ timerColor }}\" strokewidth=\"4\" strokelinecap=\"round\" strokedasharray=\"100\" strokedashoffset=\"{{ timerOffset }}\" style=\"transition:stroke-dashoffset 1s linear\"><\u002Fcircle><\u002Fsvg>\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800\">{{ timerSec }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font-size:15px;font-weight:800;color:{{ turnColor }}\">{{ turnName }}<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:var(--text-secondary)\">{{ turnHint }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ tYour }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"width:11px;height:11px;border-radius:50%;background:var(--primary);animation:pulseRing 1.6s infinite\"><\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- actions -->\n        <div style=\"flex:none;display:flex;gap:9px;position:relative\">\n          <button onclick=\"{{ onDiscard }}\" disabled=\"{{ discardDisabled }}\" style=\"flex:1;height:50px;border-radius:var(--r-md);background:var(--primary);color:var(--on-primary);font-weight:700;font-size:14.5px;opacity:{{ discardOpacity }};box-shadow:var(--sh-sm);transition:transform .12s ease\" style-active=\"transform:scale(.98)\">{{ discardLabel }}<\u002Fbutton>\n          <button onclick=\"{{ onOpenDraw }}\" disabled=\"{{ actionsDisabled }}\" style=\"flex:1;height:50px;border-radius:var(--r-md);background:var(--surface-raised);color:var(--text);border:1.5px solid var(--border-strong);font-weight:700;font-size:14.5px;opacity:{{ actionsOpacity }};transition:transform .12s ease\" style-active=\"transform:scale(.98)\">Draw<\u002Fbutton>\n          <button onclick=\"{{ onDeclare }}\" disabled=\"{{ actionsDisabled }}\" style=\"flex:none;padding:0 18px;height:50px;border-radius:var(--r-md);background:var(--accent);color:var(--on-accent);font-weight:800;font-size:14.5px;letter-spacing:.3px;box-shadow:var(--glow-accent);opacity:{{ actionsOpacity }};transition:transform .12s ease\" style-active=\"transform:scale(.98)\">Declare<\u002Fbutton>\n\n          <sc-if value=\"{{ drawOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div onclick=\"{{ onCloseDraw }}\" style=\"position:fixed;inset:0;z-index:30\"><\u002Fdiv>\n            <div style=\"position:absolute;bottom:60px;right:0;z-index:31;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-xl);padding:8px;width:220px;animation:popIn .18s ease both\">\n              <div style=\"font-size:11px;color:var(--text-muted);padding:6px 8px 8px;font-weight:600\">Draw a card from…<\u002Fdiv>\n              <button onclick=\"{{ onDrawDeck }}\" style=\"display:flex;align-items:center;gap:10px;width:100%;padding:10px;border-radius:var(--r-sm);text-align:left\" style-hover=\"background:var(--surface-sunken)\"><span style=\"width:26px;height:34px;border-radius:5px;background:repeating-linear-gradient(45deg,var(--card-back),var(--card-back) 4px,var(--card-back-2) 4px,var(--card-back-2) 8px);flex:none\"><\u002Fspan><span><div style=\"font-size:13.5px;font-weight:700\">Closed deck<\u002Fdiv><div style=\"font-size:11px;color:var(--text-secondary)\">Unknown card · {{ drawCount }} left<\u002Fdiv><\u002Fspan><\u002Fbutton>\n              <button onclick=\"{{ onDrawDiscard }}\" style=\"display:flex;align-items:center;gap:10px;width:100%;padding:10px;border-radius:var(--r-sm);text-align:left\" style-hover=\"background:var(--surface-sunken)\"><span style=\"width:26px;height:34px;border-radius:5px;background:var(--card-face);border:1px solid var(--card-edge);color:{{ discardColor }};flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px\">{{ discardRank }}<\u002Fspan><span><div style=\"font-size:13.5px;font-weight:700\">Discard pile<\u002Fdiv><div style=\"font-size:11px;color:var(--text-secondary)\">Take the {{ discardRank }}{{ discardSym }}<\u002Fdiv><\u002Fspan><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- hand -->\n        <div style=\"flex:none;position:relative;height:126px;margin-top:6px\">\n          <sc-for list=\"{{ myHand }}\" as=\"card\" hint-placeholder-count=\"7\">\n            <div style=\"position:absolute;left:50%;bottom:6px;transform-origin:50% 118%;z-index:{{ card.z }};transform:{{ card.transform }};transition:transform .2s ease\">\n              <button onclick=\"{{ card.onTap }}\" style=\"position:relative;width:64px;height:92px;border-radius:var(--r-card);background:var(--card-face);color:{{ card.color }};border:1px solid var(--card-edge);box-shadow:{{ card.shadow }};animation:dealIn .5s cubic-bezier(.2,.7,.3,1) both;animation-delay:{{ card.delay }}\">\n                <div style=\"position:absolute;top:5px;left:7px;text-align:center;line-height:.82;font-weight:800;font-size:14px\">{{ card.rank }}<div style=\"font-size:12px\">{{ card.sym }}<\u002Fdiv><\u002Fdiv>\n                <sc-if value=\"{{ card.isJoker }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px\"><span style=\"font-size:26px\">★<\u002Fspan><span style=\"font-size:9px;font-weight:800;letter-spacing:1px\">JOKER<\u002Fspan><span style=\"font-size:9px;color:var(--text-muted)\">0 pts<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                <sc-if value=\"{{ card.notJoker }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center\"><span style=\"font-family:var(--font-display);font-size:33px;line-height:.9\">{{ card.rank }}<\u002Fspan><span style=\"font-size:18px;margin-top:-3px\">{{ card.sym }}<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ declareOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;inset:0;background:var(--overlay);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;z-index:40;padding:20px;animation:popIn .22s ease both\">\n            <div style=\"text-align:center;background:var(--surface-raised);border:1.5px solid color-mix(in oklch,var(--accent) 45%,transparent);border-radius:var(--r-xl);padding:28px 26px;box-shadow:var(--glow-accent),var(--sh-xl);max-width:300px\">\n              <div style=\"font-size:34px\">🃏<\u002Fdiv>\n              <div style=\"font-family:var(--font-display);font-size:28px;margin-top:6px\">Declare?<\u002Fdiv>\n              <div style=\"color:var(--text-secondary);font-size:13.5px;margin:8px 0 4px;text-wrap:pretty\">You're betting you hold the <b style=\"color:var(--text)\">lowest total<\u002Fb> at the table.<\u002Fdiv>\n              <div style=\"display:flex;gap:8px;justify-content:center;margin:14px 0 20px\">\n                <div style=\"flex:1;padding:10px;border-radius:var(--r-sm);background:color-mix(in oklch,var(--success) 15%,var(--surface))\"><div style=\"font-size:11px;color:var(--text-secondary)\">If right<\u002Fdiv><div style=\"font-weight:800;color:var(--success)\">You score 0<\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;padding:10px;border-radius:var(--r-sm);background:color-mix(in oklch,var(--danger) 15%,var(--surface))\"><div style=\"font-size:11px;color:var(--text-secondary)\">If wrong<\u002Fdiv><div style=\"font-weight:800;color:var(--danger)\">+40 penalty<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:10px\">\n                <button onclick=\"{{ onCancelDeclare }}\" style=\"flex:1;height:48px;border-radius:var(--r-pill);background:var(--surface-sunken);border:1px solid var(--border-strong);font-weight:700\">Not yet<\u002Fbutton>\n                <button onclick=\"{{ onConfirmDeclare }}\" style=\"flex:1;height:48px;border-radius:var(--r-pill);background:var(--accent);color:var(--on-accent);font-weight:800;box-shadow:var(--glow-accent)\">Declare!<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ ROUND SUMMARY ============ -->\n      <sc-if value=\"{{ isSummary }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"height:100%;overflow:hidden;display:flex;flex-direction:column;gap:11px;animation:floatUp .4s ease both\">\n        <div style=\"text-align:center;padding-top:2px\">\n          <div style=\"font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted)\">Round 4 complete<\u002Fdiv>\n          <div style=\"font-family:var(--font-display);font-size:30px;line-height:1;margin-top:2px\">The reveal<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- declare result banner -->\n        <div style=\"border-radius:var(--r-lg);padding:14px 16px;background:{{ declBg }};border:1px solid {{ declBorder }};display:flex;align-items:center;gap:12px;animation:popIn .3s ease\">\n          <div style=\"width:42px;height:42px;border-radius:50%;background:{{ declIconBg }};color:{{ declIconColor }};display:flex;align-items:center;justify-content:center;font-size:20px;flex:none\">{{ declIcon }}<\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font-weight:800;font-size:15px;color:{{ declTitleColor }}\">{{ declTitle }}<\u002Fdiv><div style=\"font-size:12.5px;color:var(--text-secondary);margin-top:1px\">{{ declSub }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- revealed hands -->\n        <div style=\"flex:1;min-height:60px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding-right:2px\">\n          <sc-for list=\"{{ summaryRows }}\" as=\"row\" hint-placeholder-count=\"5\">\n            <div style=\"border-radius:var(--r-md);background:var(--surface);border:1px solid {{ row.border }};padding:11px 12px;{{ row.glow }}\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px\">\n                <div style=\"width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;{{ row.face }}\">{{ row.initials }}<\u002Fdiv>\n                <div style=\"flex:1;font-weight:700;font-size:14px\">{{ row.name }}<\u002Fdiv>\n                <sc-if value=\"{{ row.isDeclarer }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px;font-weight:800;letter-spacing:.5px;color:var(--accent-strong);background:color-mix(in oklch,var(--accent) 18%,transparent);padding:3px 8px;border-radius:var(--r-pill)\">DECLARED<\u002Fspan><\u002Fsc-if>\n                <div style=\"text-align:right\"><div style=\"font-family:var(--font-display);font-size:22px;line-height:1;color:{{ row.totalColor }}\">{{ row.total }}<\u002Fdiv><div style=\"font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px\">this round<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:5px\">\n                <sc-for list=\"{{ row.cards }}\" as=\"mc\" hint-placeholder-count=\"4\">\n                  <div style=\"width:34px;height:48px;border-radius:6px;background:var(--card-face);color:{{ mc.color }};border:1px solid var(--card-edge);box-shadow:var(--sh-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:flipIn .5s ease both;animation-delay:{{ mc.delay }}\"><span style=\"font-weight:800;font-size:14px;line-height:1\">{{ mc.rank }}<\u002Fspan><span style=\"font-size:11px\">{{ mc.sym }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n                <sc-if value=\"{{ row.hasPenalty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:flex;align-items:center;margin-left:4px;font-size:12px;font-weight:800;color:var(--danger)\">+40 penalty<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- cumulative -->\n        <div style=\"border-radius:var(--r-lg);background:var(--surface-raised);border:1px solid var(--border);padding:14px;box-shadow:var(--sh-sm)\">\n          <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:10px\">Running scores · out at 100<\u002Fdiv>\n          <sc-for list=\"{{ cumulative }}\" as=\"cu\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:center;gap:10px;padding:6px 0\">\n              <div style=\"width:20px;font-size:12px;font-weight:800;color:var(--text-muted);text-align:center\">{{ cu.rankLabel }}<\u002Fdiv>\n              <div style=\"flex:1;min-width:0\"><div style=\"display:flex;align-items:center;gap:6px;font-size:13.5px;font-weight:700;margin-bottom:4px\">{{ cu.name }}<sc-if value=\"{{ cu.isLeader }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:var(--accent)\">👑<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                <div style=\"height:7px;border-radius:var(--r-pill);background:var(--surface-sunken);overflow:hidden\"><div style=\"height:100%;width:{{ cu.pct }};background:{{ cu.barColor }};border-radius:var(--r-pill);transition:width .6s ease\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family:var(--font-display);font-size:20px;width:38px;text-align:right;color:{{ cu.scoreColor }}\">{{ cu.score }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- next round -->\n        <div style=\"flex:none;display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r-pill);background:var(--surface);border:1px solid var(--border)\">\n          <div style=\"flex:1\"><div style=\"font-weight:700;font-size:13.5px\">{{ nextTitle }}<\u002Fdiv><div style=\"height:5px;border-radius:var(--r-pill);background:var(--surface-sunken);margin-top:6px;overflow:hidden\"><div style=\"height:100%;background:var(--primary);transform-origin:left;animation:barShrink 5s linear both\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <button onclick=\"{{ onNextRound }}\" style=\"flex:none;height:40px;padding:0 18px;border-radius:var(--r-pill);background:var(--primary);color:var(--on-primary);font-weight:700;font-size:13.5px\">Next round →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ MATCH OVER ============ -->\n      <sc-if value=\"{{ isOver }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"height:100%;overflow:hidden;display:flex;flex-direction:column;animation:floatUp .4s ease both;position:relative\">\n        <sc-if value=\"{{ oResults }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0\">\n            <sc-for list=\"{{ confetti }}\" as=\"cf\" hint-placeholder-count=\"0\"><div style=\"position:absolute;top:-20px;left:{{ cf.left }};width:{{ cf.size }};height:{{ cf.size }};background:{{ cf.color }};border-radius:2px;animation:confetti {{ cf.dur }} linear infinite;animation-delay:{{ cf.delay }}\"><\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"position:relative;z-index:1;display:flex;flex-direction:column;gap:12px;flex:1;min-height:0\">\n          <div style=\"text-align:center;padding-top:6px;flex:none\">\n            <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent)\">Winner<\u002Fdiv>\n            <div style=\"width:80px;height:80px;border-radius:50%;margin:10px auto 8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:29px;{{ winnerFace }};box-shadow:var(--glow-accent),var(--sh-lg);animation:popIn .5s ease both\">{{ winnerInitials }}<\u002Fdiv>\n            <div style=\"font-family:var(--font-display);font-size:33px;line-height:1\">{{ winnerName }}<\u002Fdiv>\n            <div style=\"color:var(--text-secondary);font-size:13px;margin-top:5px\">Last one standing — kept it low to the end. 🏆<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- final scoreboard -->\n          <div style=\"flex:1;min-height:0;border-radius:var(--r-xl);background:var(--surface-raised);border:1px solid var(--border);box-shadow:var(--sh-md);overflow:hidden;display:flex;flex-direction:column\">\n            <div style=\"padding:11px 16px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);border-bottom:1px solid var(--border);flex:none\">Final standings<\u002Fdiv>\n            <div style=\"flex:1;min-height:0;overflow-y:auto\">\n            <sc-for list=\"{{ finalStanding }}\" as=\"fs\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);{{ fs.rowBg }}\">\n                <div style=\"width:28px;height:28px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;{{ fs.medalStyle }}\">{{ fs.place }}<\u002Fdiv>\n                <div style=\"width:32px;height:32px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;{{ fs.face }}\">{{ fs.initials }}<\u002Fdiv>\n                <div style=\"flex:1;font-weight:700;font-size:14.5px\">{{ fs.name }}<\u002Fdiv>\n                <div style=\"text-align:right\"><div style=\"font-family:var(--font-display);font-size:22px;line-height:1;color:{{ fs.scoreColor }}\">{{ fs.score }}<\u002Fdiv><div style=\"font-size:9.5px;color:var(--text-muted)\">{{ fs.tag }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- rematch CTA -->\n          <sc-if value=\"{{ oResults }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ onRematch }}\" style=\"width:100%;height:56px;border-radius:var(--r-pill);background:var(--primary);color:var(--on-primary);font-size:16.5px;font-weight:700;box-shadow:var(--glow-primary);transition:transform .12s ease\" style-active=\"transform:translateY(1px) scale(.99)\">Rematch 🔁<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ oRematchPending }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border-radius:var(--r-lg);background:var(--surface);border:1px solid var(--border);padding:16px\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:12px\"><span style=\"width:16px;height:16px;border:2.5px solid color-mix(in oklch,var(--primary) 35%,transparent);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite\"><\u002Fspan><span style=\"font-weight:700;font-size:14px\">Waiting for players to accept…<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:8px\">\n                <sc-for list=\"{{ rematchAvatars }}\" as=\"ra\" hint-placeholder-count=\"5\"><div style=\"position:relative;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;{{ ra.face }};opacity:{{ ra.opacity }}\">{{ ra.initials }}<sc-if value=\"{{ ra.accepted }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;bottom:-2px;right:-2px;width:15px;height:15px;border-radius:50%;background:var(--success);color:white;font-size:9px;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface)\">✓<\u002Fspan><\u002Fsc-if><\u002Fdiv><\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ oRematchConfirmed }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <div style=\"border-radius:var(--r-lg);background:color-mix(in oklch,var(--success) 15%,var(--surface));border:1px solid color-mix(in oklch,var(--success) 40%,transparent);padding:14px 16px;display:flex;align-items:center;gap:11px\"><div style=\"width:34px;height:34px;border-radius:50%;background:var(--success);color:white;display:flex;align-items:center;justify-content:center;font-size:17px\">✓<\u002Fdiv><div style=\"font-weight:700;font-size:14px\">Everyone's in! Starting a new match…<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ onEnterLobby }}\" style=\"width:100%;height:52px;border-radius:var(--r-pill);background:var(--primary);color:var(--on-primary);font-weight:700;font-size:15.5px\">Go to lobby<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n\n    <!-- DEMO DROPDOWN -->\n    <sc-if value=\"{{ dockShow }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onToggleDock }}\" style=\"position:absolute;inset:0;z-index:65\"><\u002Fdiv>\n    <div style=\"position:absolute;top:60px;right:14px;z-index:66;width:min(322px,calc(100% - 28px));background:color-mix(in oklch,var(--surface) 94%,transparent);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-xl);padding:13px;animation:popIn .16s ease both\">\n      <div style=\"font-size:10px;font-weight:800;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:9px\">Demo · jump to screen<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px\">\n        <sc-for list=\"{{ screenTabs }}\" as=\"t\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ t.onTap }}\" style=\"height:31px;padding:0 12px;border-radius:var(--r-pill);font-size:12.5px;font-weight:700;white-space:nowrap;background:{{ t.bg }};color:{{ t.color }};border:1px solid {{ t.border }};transition:all .15s ease\">{{ t.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"font-size:10px;font-weight:800;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px\">State<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:5px\">\n        <sc-for list=\"{{ stateChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ c.onTap }}\" style=\"height:29px;padding:0 11px;border-radius:var(--r-sm);font-size:12px;font-weight:600;white-space:nowrap;background:{{ c.bg }};color:{{ c.color }};border:1px solid {{ c.border }};transition:all .15s ease\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- HOW TO PLAY -->\n    <sc-if value=\"{{ helpOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;z-index:80;background:var(--overlay);backdrop-filter:blur(8px);display:flex;flex-direction:column;animation:popIn .2s ease both\">\n      <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:18px 18px 12px\">\n        <div><div style=\"font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--primary)\">Least Count<\u002Fdiv><div style=\"font-family:var(--font-display);font-size:27px;line-height:1;margin-top:2px\">How to play<\u002Fdiv><\u002Fdiv>\n        <button onclick=\"{{ onCloseHelp }}\" aria-label=\"Close\" style=\"width:38px;height:38px;border-radius:50%;background:var(--surface-raised);border:1px solid var(--border);color:var(--text-secondary);font-size:15px;display:flex;align-items:center;justify-content:center;flex:none\" style-active=\"transform:scale(.94)\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-height:0;overflow-y:auto;padding:0 18px 20px;display:flex;flex-direction:column;gap:12px\">\n        <div style=\"border-radius:var(--r-lg);background:var(--surface);border:1px solid var(--border);padding:14px 15px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px\"><span style=\"width:27px;height:27px;border-radius:var(--r-sm);background:color-mix(in oklch,var(--primary) 16%,transparent);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:15px;flex:none\">◎<\u002Fspan><span style=\"font-weight:800;font-size:15px\">The goal<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13.5px;color:var(--text-secondary);line-height:1.5;text-wrap:pretty\">Keep your hand’s point total as low as possible. Players are knocked out when they hit 100 points — the last one at the table wins the match.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius:var(--r-lg);background:var(--surface);border:1px solid var(--border);padding:14px 15px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:11px\"><span style=\"width:27px;height:27px;border-radius:var(--r-sm);background:color-mix(in oklch,var(--suit-red) 16%,transparent);color:var(--suit-red);display:flex;align-items:center;justify-content:center;font-size:15px;flex:none\">♦<\u002Fspan><span style=\"font-weight:800;font-size:15px\">Card values<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;font-size:13.5px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"color:var(--text-secondary)\">Ace<\u002Fspan><b>1 point<\u002Fb><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"color:var(--text-secondary)\">Number cards 2–10<\u002Fspan><b>face value<\u002Fb><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"color:var(--text-secondary)\">Jack · Queen · King<\u002Fspan><b>10 each<\u002Fb><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"color:var(--text-secondary)\">Joker<\u002Fspan><b style=\"color:var(--joker)\">0 points<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius:var(--r-lg);background:var(--surface);border:1px solid var(--border);padding:14px 15px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px\"><span style=\"width:27px;height:27px;border-radius:var(--r-sm);background:color-mix(in oklch,var(--primary) 16%,transparent);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:15px;flex:none\">↻<\u002Fspan><span style=\"font-weight:800;font-size:15px\">On your turn<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13.5px;color:var(--text-secondary);line-height:1.5;text-wrap:pretty\">Discard a single card, or several cards of the <b style=\"color:var(--text)\">same rank<\u002Fb> at once. Then draw one — from the closed deck, or take the top of the discard pile.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius:var(--r-lg);background:color-mix(in oklch,var(--accent) 10%,var(--surface));border:1px solid color-mix(in oklch,var(--accent) 35%,transparent);padding:14px 15px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px\"><span style=\"width:27px;height:27px;border-radius:var(--r-sm);background:color-mix(in oklch,var(--accent) 24%,transparent);color:var(--accent-strong);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex:none\">!<\u002Fspan><span style=\"font-weight:800;font-size:15px;color:var(--accent-strong)\">Declaring<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13.5px;color:var(--text-secondary);line-height:1.5;text-wrap:pretty\">At the start of your turn, call that you hold the lowest total. <b style=\"color:var(--success)\">Right<\u002Fb> — you score 0 and everyone else scores their hand. <b style=\"color:var(--danger)\">Wrong<\u002Fb> — you take a +40 penalty.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius:var(--r-lg);background:var(--surface);border:1px solid var(--border);padding:14px 15px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px\"><span style=\"width:27px;height:27px;border-radius:var(--r-sm);background:color-mix(in oklch,var(--primary) 16%,transparent);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:14px;flex:none\">🏆<\u002Fspan><span style=\"font-weight:800;font-size:15px\">Winning the match<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13.5px;color:var(--text-secondary);line-height:1.5;text-wrap:pretty\">Scores build up across rounds. Reach 100 and you’re eliminated. Outlast every friend at the table to take the win.<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ onCloseHelp }}\" style=\"height:50px;border-radius:var(--r-pill);background:var(--primary);color:var(--on-primary);font-weight:700;font-size:15px;box-shadow:var(--glow-primary)\">Got it — deal me in<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;initialTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;'dark' | 'light'&quot;,&quot;section&quot;:&quot;Appearance&quot;},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Appearance&quot;},&quot;showControls&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Demo&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    themeOverride: null, screen: 'landing',\n    landing: 'idle', lobby: 'filling', table: 'your', summary: 'revealing', over: 'results',\n    nick: 'Robin', code: '', selected: [1, 2], drawOpen: false, declareOpen: false,\n    timer: 14, copied: false, dockExpanded: false, helpOpen: false,\n    hand: [\n      { id: 'c1', r: 'A', s: 'H' }, { id: 'c2', r: '4', s: 'S' }, { id: 'c3', r: '4', s: 'D' },\n      { id: 'c4', r: '7', s: 'C' }, { id: 'c5', r: '9', s: 'H' }, { id: 'c6', r: 'K', s: 'S' },\n      { id: 'c7', r: 'JOKER', s: null }\n    ],\n    discard: { r: '6', s: 'H' }, drawCount: 42,\n  };\n\n  SUIT = { S: { sym: '♠', c: 'var(--suit-black)' }, H: { sym: '♥', c: 'var(--suit-red)' }, D: { sym: '♦', c: 'var(--suit-red)' }, C: { sym: '♣', c: 'var(--suit-black)' } };\n  ROSTER = [\n    { name: 'Robin', initials: 'RO', hue: 168, you: true },\n    { name: 'Mika', initials: 'MI', hue: 25 },\n    { name: 'Devon', initials: 'DE', hue: 262 },\n    { name: 'Priya', initials: 'PR', hue: 312 },\n    { name: 'Sol', initials: 'SO', hue: 78 },\n    { name: 'Amara', initials: 'AM', hue: 205 },\n    { name: 'Ken', initials: 'KE', hue: 135 },\n    { name: 'Luca', initials: 'LU', hue: 340 },\n  ];\n\n  componentDidMount() {\n    this.tick = setInterval(() => {\n      const s = this.state;\n      if (s.screen === 'table' && (s.table === 'your' || s.table === 'waiting')) {\n        this.setState(st => ({ timer: st.timer <= 1 ? 14 : st.timer - 1 }));\n      }\n    }, 1000);\n  }\n  componentWillUnmount() { clearInterval(this.tick); clearTimeout(this._rev); }\n  componentDidUpdate(pp, ps) {\n    const s = this.state;\n    if (s.screen === 'summary' && s.summary === 'revealing' && !(ps.screen === 'summary' && ps.summary === 'revealing')) {\n      clearTimeout(this._rev);\n      this._rev = setTimeout(() => { if (this.state.summary === 'revealing') this.setState({ summary: 'settled' }); }, 1700);\n    }\n  }\n\n  theme() { return this.state.themeOverride || this.props.initialTheme || 'dark'; }\n  avatarFace(hue) { return `background:oklch(var(--avatar-l) var(--avatar-c) ${hue});color:var(--on-avatar)`; }\n  mk(r, s) {\n    const isJ = r === 'JOKER';\n    const su = s ? this.SUIT[s] : null;\n    return { rank: isJ ? '★' : r, sym: su ? su.sym : '', color: isJ ? 'var(--joker)' : (su ? su.c : 'var(--card-ink)'), isJoker: isJ, notJoker: !isJ };\n  }\n  val(r) { if (r === 'A') return 1; if (r === 'JOKER') return 0; if (r === 'J' || r === 'Q' || r === 'K') return 10; return parseInt(r, 10); }\n\n  set(k, v) { return () => this.setState({ [k]: v }); }\n\n  renderVals() {\n    const S = this.state, P = this.props;\n    const theme = this.theme();\n    const scr = S.screen;\n\n    // ---- landing ----\n    const canCreate = S.nick.trim().length > 0 && S.landing === 'idle';\n    const canJoin = S.nick.trim().length > 0 && S.code.trim().length >= 4 && S.landing === 'idle';\n    const onCreate = () => {\n      if (!(S.nick.trim().length > 0) || S.landing !== 'idle') return;\n      this.setState({ landing: 'loading' });\n      setTimeout(() => this.setState({ landing: 'idle', screen: 'lobby', lobby: 'filling' }), 1000);\n    };\n    const onJoin = () => {\n      if (!(S.nick.trim() && S.code.trim().length >= 4) || S.landing !== 'idle') return;\n      this.setState({ landing: 'loading' });\n      setTimeout(() => {\n        if (S.code.trim() === '0000') this.setState({ landing: 'error' });\n        else this.setState({ landing: 'success' });\n      }, 1000);\n    };\n\n    // ---- lobby seats ----\n    const counts = { empty: 1, filling: 4, ready: 5, error: 4 };\n    const present = counts[S.lobby] || 1;\n    const lobbySeats = this.ROSTER.map((p, i) => {\n      const ang = -90 + i * 45;\n      const rad = ang * Math.PI / 180;\n      const left = 50 + 40 * Math.cos(rad), top = 50 + 40 * Math.sin(rad);\n      const filled = i < present;\n      return {\n        pos: `left:${left}%;top:${top}%`,\n        name: filled ? (p.you ? 'You' : p.name) : 'open',\n        label: filled ? p.initials : '+',\n        face: filled\n          ? this.avatarFace(p.hue) + (p.you ? ';box-shadow:var(--glow-primary)' : ';box-shadow:var(--sh-sm)')\n          : 'background:color-mix(in oklch,white 10%,transparent);color:color-mix(in oklch,white 55%,transparent);border:1.5px dashed color-mix(in oklch,white 30%,transparent)',\n      };\n    });\n\n    // ---- QR ----\n    const qrCells = [];\n    for (let y = 0; y < 13; y++) for (let x = 0; x < 13; x++) {\n      const finder = (x < 4 && y < 4) || (x > 8 && y < 4) || (x < 4 && y > 8);\n      const on = finder ? (x === 0 || x === 3 || x === 9 || x === 12 || y === 0 || y === 3 || y === 9 || y === 12 || (x > 0 && x < 3 && y > 0 && y < 3) || (x > 9 && x < 12 && y > 0 && y < 3) || (x > 0 && x < 3 && y > 9 && y < 12)) : ((x * 7 + y * 3 + x * y) % 3 === 0);\n      qrCells.push({ bg: on ? 'var(--text)' : 'transparent' });\n    }\n\n    // ---- table opponents ----\n    const oppList = [this.ROSTER[1], this.ROSTER[2], this.ROSTER[3], this.ROSTER[4]];\n    const oppCounts = [5, 7, 4, 6];\n    const activeOpp = S.table === 'waiting' ? 0 : -1;\n    const opponents = oppList.map((p, i) => {\n      const t = (i + 1) / (oppList.length + 1);\n      const left = 8 + t * 84;\n      const top = 12 + (1 - Math.sin(t * Math.PI)) * 24;\n      const disc = i === 1;\n      let face = this.avatarFace(p.hue) + ';box-shadow:var(--sh-sm)';\n      if (i === activeOpp) face += ';outline:3px solid var(--primary);outline-offset:2px';\n      if (disc) face += ';filter:grayscale(.6) opacity(.6)';\n      return { pos: `left:${left}%;top:${top}%`, name: p.name, initials: p.initials, count: oppCounts[i], face, disconnected: disc };\n    });\n\n    // ---- hand ----\n    const n = S.hand.length, mid = (n - 1) / 2, spread = 8;\n    const isYour = S.table === 'your';\n    const myHand = S.hand.map((c, i) => {\n      const info = this.mk(c.r, c.s);\n      const sel = S.selected.includes(i);\n      const ang = (i - mid) * spread;\n      const lift = sel ? -30 : 0;\n      return {\n        ...info,\n        z: sel ? 50 : i,\n        transform: `translateX(-50%) translateY(${lift}px) rotate(${ang}deg)`,\n        shadow: sel ? 'var(--sh-card),0 0 0 3px var(--primary),var(--glow-primary)' : 'var(--sh-card)',\n        delay: (i * 0.06) + 's',\n        onTap: () => { if (!isYour) return; this.setState(st => ({ selected: st.selected.includes(i) ? st.selected.filter(x => x !== i) : [...st.selected, i] })); },\n      };\n    });\n    const selRanks = S.selected.map(i => S.hand[i] && S.hand[i].r);\n    const sameRank = selRanks.length >= 1 && selRanks.every(r => r === selRanks[0]);\n    const canDiscard = isYour && S.selected.length >= 1 && sameRank;\n    const dInfo = this.mk(S.discard.r, S.discard.s);\n\n    const onDiscard = () => {\n      if (!canDiscard) return;\n      const first = S.hand[S.selected[0]];\n      const keep = S.hand.filter((_, i) => !S.selected.includes(i));\n      this.setState({ hand: keep, discard: { r: first.r, s: first.s }, selected: [], table: 'waiting', timer: 14 });\n    };\n    const drawCard = (src) => {\n      let nc;\n      if (src === 'discard') { nc = { id: 'd' + Date.now(), r: S.discard.r, s: S.discard.s }; }\n      else { const rs = ['A', '2', '3', '5', '8', 'Q']; const ss = ['S', 'H', 'D', 'C']; nc = { id: 'd' + Date.now(), r: rs[Math.floor(Math.random() * rs.length)], s: ss[Math.floor(Math.random() * ss.length)] }; }\n      this.setState(st => ({ hand: [...st.hand, nc], drawOpen: false, drawCount: src === 'deck' ? st.drawCount - 1 : st.drawCount }));\n    };\n\n    const timerPct = (S.timer / 14) * 100;\n\n    // ---- summary ----\n    const rows = [\n      { key: 0, p: this.ROSTER[0], name: 'You', cards: [['A', 'H'], ['2', 'C'], ['3', 'D']], declarer: false },\n      { key: 1, p: this.ROSTER[1], cards: [['7', 'S'], ['K', 'D'], ['4', 'H']], declarer: true },\n      { key: 4, p: this.ROSTER[4], cards: [['JOKER', null], ['Q', 'S'], ['3', 'C']] },\n      { key: 3, p: this.ROSTER[3], cards: [['A', 'S'], ['8', 'D'], ['6', 'C'], ['2', 'H']] },\n      { key: 2, p: this.ROSTER[2], cards: [['5', 'C'], ['9', 'H'], ['J', 'S']] },\n    ];\n    const settled = S.summary !== 'revealing';\n    const summaryRows = rows.map(r => {\n      const total = r.cards.reduce((a, c) => a + this.val(c[0]), 0);\n      const isDecl = r.declarer;\n      return {\n        name: r.p.you ? 'You' : r.p.name, initials: r.p.initials, isDeclarer: isDecl,\n        face: this.avatarFace(r.p.hue),\n        border: isDecl ? 'color-mix(in oklch,var(--danger) 45%,transparent)' : 'var(--border)',\n        glow: isDecl ? 'box-shadow:0 0 0 1px color-mix(in oklch,var(--danger) 30%,transparent)' : '',\n        total: settled ? (isDecl ? total + 40 : total) : '·',\n        totalColor: isDecl ? 'var(--danger)' : (r.p.you ? 'var(--primary)' : 'var(--text)'),\n        hasPenalty: isDecl && settled,\n        cards: r.cards.map((c, i) => { const info = this.mk(c[0], c[1]); return { rank: info.rank, sym: info.sym, color: info.color, delay: (i * 0.09) + 's' }; }),\n      };\n    });\n\n    const cumData = [\n      { p: this.ROSTER[0], score: 42 }, { p: this.ROSTER[4], score: 51 },\n      { p: this.ROSTER[3], score: 58 }, { p: this.ROSTER[2], score: 66 }, { p: this.ROSTER[1], score: 88 },\n    ].sort((a, b) => a.score - b.score);\n    const cumulative = cumData.map((c, i) => ({\n      rankLabel: (i + 1), name: c.p.you ? 'You' : c.p.name, score: c.score,\n      isLeader: i === 0, pct: Math.min(100, c.score) + '%',\n      barColor: c.score >= 80 ? 'var(--danger)' : (i === 0 ? 'var(--primary)' : 'var(--accent)'),\n      scoreColor: i === 0 ? 'var(--primary)' : (c.score >= 80 ? 'var(--danger)' : 'var(--text)'),\n    }));\n\n    // ---- match over ----\n    const finData = [\n      { p: this.ROSTER[0], score: 62, tag: 'survivor', place: 1 },\n      { p: this.ROSTER[4], score: 101, tag: 'out R7', place: 2 },\n      { p: this.ROSTER[3], score: 104, tag: 'out R6', place: 3 },\n      { p: this.ROSTER[1], score: 112, tag: 'out R5', place: 4 },\n      { p: this.ROSTER[2], score: 120, tag: 'out R4', place: 5 },\n    ];\n    const medalCols = { 1: 'background:var(--accent);color:var(--on-accent)', 2: 'background:var(--border-strong);color:var(--text)', 3: 'background:color-mix(in oklch,var(--accent) 40%,var(--surface));color:var(--text)' };\n    const finalStanding = finData.map(f => ({\n      place: f.place, name: f.p.you ? 'You' : f.p.name, initials: f.p.initials, score: f.score, tag: f.tag,\n      face: this.avatarFace(f.p.hue),\n      medalStyle: medalCols[f.place] || 'background:var(--surface-sunken);color:var(--text-muted)',\n      rowBg: f.place === 1 ? 'background:color-mix(in oklch,var(--accent) 9%,transparent)' : '',\n      scoreColor: f.place === 1 ? 'var(--accent-strong)' : (f.score >= 100 ? 'var(--text-muted)' : 'var(--text)'),\n    }));\n    const confCols = ['var(--primary)', 'var(--accent)', 'var(--suit-red)', 'var(--joker)', 'var(--warn)'];\n    const confetti = S.screen === 'over' && S.over === 'results'\n      ? Array.from({ length: 44 }, (_, i) => ({ left: Math.round(Math.random() * 100) + '%', size: (6 + Math.round(Math.random() * 6)) + 'px', color: confCols[i % confCols.length], dur: (2.6 + Math.random() * 2.2).toFixed(2) + 's', delay: (Math.random() * 3).toFixed(2) + 's' }))\n      : [];\n    const rematchAvatars = [this.ROSTER[0], this.ROSTER[4], this.ROSTER[3], this.ROSTER[1], this.ROSTER[2]].map((p, i) => ({\n      initials: p.initials, face: this.avatarFace(p.hue), accepted: i < 3, opacity: i < 3 ? '1' : '.45',\n    }));\n\n    // ---- dock ----\n    const scrDefs = [['landing', 'Landing'], ['lobby', 'Lobby'], ['table', 'Table'], ['summary', 'Summary'], ['over', 'Match Over']];\n    const screenTabs = scrDefs.map(([k, l]) => ({\n      label: l, onTap: this.set('screen', k),\n      bg: scr === k ? 'var(--primary)' : 'transparent', color: scr === k ? 'var(--on-primary)' : 'var(--text-secondary)',\n      border: scr === k ? 'var(--primary)' : 'var(--border)',\n    }));\n    const chipDefs = {\n      landing: [['idle', 'Idle'], ['loading', 'Loading'], ['error', 'Error'], ['success', 'Success']],\n      lobby: [['empty', 'Empty'], ['filling', 'Filling'], ['ready', 'Ready'], ['error', 'Error']],\n      table: [['your', 'Your turn'], ['waiting', 'Waiting'], ['reconnecting', 'Reconnecting'], ['error', 'Error']],\n      summary: [['revealing', 'Revealing'], ['settled', 'Settled'], ['pending', 'Next round']],\n      over: [['results', 'Results'], ['rematch-pending', 'Rematch pending'], ['rematch-confirmed', 'Confirmed']],\n    };\n    const curKey = scr;\n    const curVal = S[scr];\n    const stateChips = (chipDefs[curKey] || []).map(([k, l]) => ({\n      label: l, onTap: this.set(scr, k),\n      bg: curVal === k ? 'var(--surface-raised)' : 'transparent', color: curVal === k ? 'var(--text)' : 'var(--text-muted)',\n      border: curVal === k ? 'var(--border-strong)' : 'var(--border)',\n    }));\n\n    const topSubMap = { landing: 'A friendly card game', lobby: 'Room · Cozy Corner', table: 'Round 4 · 5 players', summary: 'Round 4 · reveal', over: 'Match complete' };\n\n    return {\n      theme, motionAttr: P.reduceMotion ? 'off' : 'on', showDock: P.showControls !== false,\n      isLanding: scr === 'landing', isLobby: scr === 'lobby', isTable: scr === 'table', isSummary: scr === 'summary', isOver: scr === 'over',\n      topSub: topSubMap[scr] || '',\n      onToggleTheme: () => this.setState({ themeOverride: theme === 'dark' ? 'light' : 'dark' }),\n      themeIcon: theme === 'dark' ? '☾' : '☀', themeLabel: theme === 'dark' ? 'Dark' : 'Light',\n      screenTabs, stateC
